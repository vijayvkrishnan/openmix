# OpenMix — Ingredient Alias Mappings
#
# Maps generic/short names used in incompatible pair rules to INCI name prefixes.
# This allows rules like "CALCIUM + IRON" to match specific forms like
# "CALCIUM CARBONATE" and "FERROUS SULFATE".

CALCIUM:
  - CALCIUM
  - DICALCIUM
  - TRICALCIUM

IRON:
  - IRON
  - FERROUS
  - FERRIC

ZINC:
  - ZINC

COPPER:
  - COPPER

MAGNESIUM:
  - MAGNESIUM

PROBIOTICS:
  - LACTOBACILLUS
  - BIFIDOBACTERIUM
  - BACILLUS COAGULANS
  - SACCHAROMYCES BOULARDII
  - STREPTOCOCCUS THERMOPHILUS
  - LACTOCOCCUS
  - ENTEROCOCCUS FAECIUM

COPPER PEPTIDE:
  - COPPER TRIPEPTIDE
  - COPPER PEPTIDE
  - GHK-CU

QUATERNARY AMMONIUM:
  - QUATERNIUM
  - CETRIMONIUM
  - BEHENTRIMONIUM
  - STEARALKONIUM
  - POLYQUATERNIUM

TANNINS:
  - TANNIN
  - TANNIC ACID

VITAMIN D3:
  - CHOLECALCIFEROL
  - VITAMIN D3
  - VITAMIN D

VITAMIN K2:
  - MENAQUINONE
  - VITAMIN K2
  - VITAMIN K

WHEY PROTEIN:
  - WHEY PROTEIN
  - LACTALBUMIN
  - LACTOGLOBULIN

CASEIN:
  - CASEIN
  - CASEINATE

IRON OXIDES:
  - IRON OXIDE
  - CI 77491
  - CI 77492
  - CI 77499

GREEN TEA EXTRACT:
  - CAMELLIA SINENSIS
  - GREEN TEA
  - EGCG
