# OpenMix — Ingredient Alias Mappings
#
# Maps generic/short names used in incompatible pair rules to INCI name prefixes.
# This allows rules like "CALCIUM + IRON" to match specific forms like
# "CALCIUM CARBONATE" and "FERROUS SULFATE".

