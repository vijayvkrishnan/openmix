# =============================================================================
# HARD RULES — Unconditional, dangerous. Always fire.
# =============================================================================

# --- Toxic Gas Generation ---

- a: SODIUM HYPOCHLORITE
  b: HYDROCHLORIC ACID
  type: hard
  severity: error
  mechanism: chemical_reaction
  confidence: 1.0
  source: "CDC NIOSH Pocket Guide; NaOCl + HCl -> Cl2 reaction"
  category: all
  message: >
    Produces toxic Chlorine gas (Cl2). Lethal at low concentrations.
    Never combine in any product or cleaning context.

- a: SODIUM HYPOCHLORITE
  b: AMMONIA
  type: hard
  severity: error
  mechanism: chemical_reaction
  confidence: 1.0
  source: "CDC NIOSH documentation; common household poisoning pathway"
  category: all
  message: >
    Produces toxic Chloramine gas (NH2Cl). Leading cause of household
    chemical poisoning. Never combine.

- a: SODIUM HYPOCHLORITE
  b: ACETIC ACID
  type: hard
