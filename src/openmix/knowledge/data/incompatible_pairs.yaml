# --- Complete Mutual Deactivation ---

- a: BENZOYL PEROXIDE
  b: RETINOL
  type: hard
  severity: error
  mechanism: oxidation
  confidence: 1.0
  source: "Bershad 2001, J Am Acad Dermatol; Thiboutot et al. 2006"
  category: all
  message: >
    Benzoyl Peroxide oxidizes and deactivates Retinol on contact.
    Both ingredients become inactive. Use at different times of day.

- a: BENZOYL PEROXIDE
  b: ASCORBIC ACID
  type: hard
  severity: error
  mechanism: oxidation
  confidence: 1.0
  source: "Redox chemistry; BPO E0 vs ascorbate E0 incompatibility"
  category: all
  message: >
    Benzoyl Peroxide oxidizes L-Ascorbic Acid, rendering both inactive.
    Fundamental redox incompatibility.

- a: BENZOYL PEROXIDE
