- a: TRETINOIN
  b: BENZOYL PEROXIDE
  type: hard
  severity: error
  mechanism: oxidation
  confidence: 1.0
  source: "Bershad 2001; Thiboutot et al. 2006; standard dermatological guidance"
  category: all
  message: >
    Benzoyl Peroxide oxidizes and deactivates Tretinoin on contact.
