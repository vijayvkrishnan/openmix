# --- Carcinogen Formation ---

- a: ASCORBIC ACID
  b: SODIUM BENZOATE
  type: hard
  severity: error
  mechanism: degradation
  confidence: 1.0
  source: "FDA beverage benzene survey 2006; Gardner & Lawrence, J Agric Food Chem 1993"
  category: all
  message: >
    Can form benzene (a Group 1 carcinogen) in acidic conditions with
    heat or UV exposure. Well-documented FDA concern that triggered
    beverage recalls. Use alternative preservatives or ensure pH > 4
    and exclude transition metal catalysts.

