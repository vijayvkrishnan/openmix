# --- Fenton Reaction (Free Radical Generation) ---

- a: COPPER PEPTIDE
  b: ASCORBIC ACID
  type: hard
  severity: error
  mechanism: chelation
  confidence: 0.95
  source: "Fenton chemistry; Cu2+ reduction by ascorbate generates hydroxyl radicals"
  category: all
  message: >
    Ascorbic Acid reduces Cu2+ to Cu1+, deactivating copper peptides
    and generating free radicals via Fenton-like reactions. Net effect
    is pro-oxidant, opposite of intended benefit.

- a: COPPER TRIPEPTIDE-1
  b: ASCORBIC ACID
  type: hard
  severity: error
  mechanism: chelation
  confidence: 0.95
  source: "Fenton chemistry; GHK-Cu complex disruption"
  category: all
  message: >
    Ascorbic Acid reduces Cu2+ in GHK-Cu to Cu1+, deactivating the
    peptide complex and generating reactive oxygen species.

# --- Antimicrobials Kill Probiotics ---

- a: PROBIOTICS
  b: POTASSIUM SORBATE
  type: hard
  severity: error
  mechanism: degradation
  confidence: 1.0
  source: "Antimicrobial mechanism of action; FDA guidance on probiotic products"
  category: all
  message: >
    Potassium Sorbate is an antimicrobial that kills probiotic organisms.
    Never use antimicrobial preservatives in probiotic formulations.
    Use physical preservation (low water activity, refrigeration).

- a: PROBIOTICS
  b: SODIUM BENZOATE
  type: hard
  severity: error
  mechanism: degradation
  confidence: 1.0
  source: "Antimicrobial mechanism of action"
  category: all
  message: >
    Sodium Benzoate is an antimicrobial that kills probiotic organisms.
    Never use in probiotic formulations.

# --- Irreversible Precipitation ---

- a: CASEIN
  b: CITRIC ACID
  type: hard
  severity: error
  mechanism: precipitation
  confidence: 1.0
  source: "Protein chemistry; casein isoelectric precipitation at pH 4.6"
  category: beverage
  message: >
    Casein precipitates irreversibly below pH 4.6. Citric acid beverages
    cause immediate curdling. Use plant protein or hydrolyzed whey
    for acidic drinks.

- a: QUATERNARY AMMONIUM
  b: SODIUM LAURYL SULFATE
  type: hard
  severity: error
  mechanism: precipitation
  confidence: 1.0
  source: "Cationic-anionic surfactant incompatibility; Rosen, Surfactants and Interfacial Phenomena"
  category: all
  message: >
    Cationic + anionic surfactants form insoluble precipitate,
    neutralizing both. Use nonionic surfactants with quat disinfectants.

- a: BENZALKONIUM CHLORIDE
  b: SODIUM LAURYL SULFATE
  type: hard
  severity: error
  mechanism: precipitation
  confidence: 1.0
  source: "Rosen, Surfactants and Interfacial Phenomena, 4th ed."
  category: all
  message: >
    Benzalkonium Chloride (cationic) + SLS (anionic) form insoluble
    salt. Never combine cationic disinfectants with anionic surfactants.

- a: BENZALKONIUM CHLORIDE
  b: SODIUM LAURETH SULFATE
  type: hard
  severity: error
  mechanism: precipitation
  confidence: 1.0
  source: "Rosen, Surfactants and Interfacial Phenomena, 4th ed."
  category: all
  message: >
    Same cationic-anionic precipitation. Use nonionic or amphoteric
    surfactants with quat disinfectants.


