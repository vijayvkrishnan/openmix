  mechanism: chemical_reaction
  confidence: 1.0
  source: "CDC NIOSH Pocket Guide; standard oxidizer incompatibility"
  category: all
  message: >
    Bleach + vinegar produces toxic Chlorine gas. Never combine.

- a: SODIUM HYPOCHLORITE
  b: HYDROGEN PEROXIDE
  type: hard
  severity: error
  mechanism: chemical_reaction
  confidence: 1.0
  source: "Oxidizer incompatibility tables; OSHA guidelines"
  category: all
  message: >
