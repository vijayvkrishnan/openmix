- a: HYDROGEN PEROXIDE
  b: ASCORBIC ACID
  type: hard
  severity: error
  mechanism: oxidation
  confidence: 1.0
  source: "Standard reduction potentials; H2O2 + ascorbate"
  category: all
  message: >
