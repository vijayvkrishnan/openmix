# ============================================================
# Supplements
# ============================================================

- name: Folic Acid
  pka: [2.35, 4.72, 8.00]
  type: acid
  optimal_ph_min: 5.0
  optimal_ph_max: 8.0
  concern_below: >
    Degrades rapidly below pH 5. Particularly unstable in acidic
    solutions with heat and light
  concern_above: Stable at neutral to slightly alkaline pH
  source: "PubChem CID 135398658; Off et al. 2005, J Chromatography A"

- name: Pantothenic Acid
  pka: [4.41]
  type: acid
  optimal_ph_min: 4.0
  optimal_ph_max: 7.0
  concern_below: Hydrolysis increases at very low pH
  concern_above: Stable at neutral pH
  source: "Merck Index"

- name: Gluconolactone
  pka: [3.70]
  type: acid
  optimal_ph_min: 3.5
  optimal_ph_max: 5.0
  concern_below: Unnecessary irritation
  concern_above: Reduced PHA exfoliation activity
  source: "Edison et al. 2004, Dermatologic Surgery"
